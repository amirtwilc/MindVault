name: mindvault
description: AI-powered notes app with end-to-end encryption.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.6.0

  # Navigation
  go_router: ^14.2.7

  # Local DB
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24

  # AI
  google_generative_ai: ^0.4.3

  # Auth / Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.2

  # Encryption
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Home widget
  home_widget: ^0.6.0

  # Swipe actions
  flutter_swipe_action_cell: ^3.1.6

  # Voice
  speech_to_text: ^7.0.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2

  # Networking / utils
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  app_links: ^6.4.1

  # Path / filesystem
  path_provider: ^2.1.4
  path: ^1.9.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4
  fake_async: ^1.3.1

  # Code generation
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.6.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0

dependency_overrides:
  # analyzer_plugin 0.12.0 is incompatible with analyzer 7.6.x (Element vs Element2 API).
  # Force the newer version that supports analyzer 7.x.
  analyzer_plugin: ^0.13.0

flutter_native_splash:
  color: "#FFFBFE"
  color_dark: "#141218"
  image: assets/images/logo.png
  android_12:
    color: "#FFFBFE"
    color_dark: "#141218"
    image: assets/images/logo.png
    icon_background_color: "#FFFBFE"
    icon_background_color_dark: "#141218"

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFBFE"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
